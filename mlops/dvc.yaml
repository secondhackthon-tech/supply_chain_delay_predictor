stages:
  ingest:
    cmd: python -m src.ingest
    deps: [src/ingest.py]
    params: [data.raw_path]
    outs: [data/raw/customer_analytics.csv]

  validate:
    cmd: python -m src.validate
    deps: [src/validate.py, data/raw/customer_analytics.csv]
    outs: [artifacts/validation_report.json]

  preprocess:
    cmd: python -m src.preprocess
    deps: [src/preprocess.py, data/raw/customer_analytics.csv]
    params: [preprocess, data.target]
    outs: [data/processed/clean.csv]

  features:
    cmd: python -m src.features
    deps: [src/features.py, data/processed/clean.csv]
    params: [preprocess.categorical, preprocess.numeric]
    outs: [data/features/features.parquet]

  train:
    cmd: python -m src.train
    deps: [src/train.py, data/features/features.parquet]
    params: [train, data.test_size, data.random_state, mlflow]
    outs:
      - artifacts/models/model.pkl
      - artifacts/models/preprocessor.pkl
    metrics:
      - artifacts/metrics.json:
          cache: false

  evaluate:
    cmd: python -m src.evaluate
    deps:
      - src/evaluate.py
      - artifacts/models/model.pkl
      - data/features/features.parquet
    params: [evaluate]
    outs:
      - artifacts/confusion_matrix.png
      - artifacts/feature_importance.png
      - artifacts/shap_summary.png

  register:
    cmd: python -m src.register
    deps: [src/register.py, artifacts/models/model.pkl, artifacts/metrics.json]
    params: [mlflow]
